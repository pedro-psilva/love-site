
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Quebra-Cabeça · Pedro &amp; Amanda</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="puzzle.style.css" />
</head>
<body>
  <div class="grain"></div>
  <div class="hearts" id="hearts" aria-hidden="true"></div>

  <!-- ░░ RÁDIO ░░ -->
  <header class="radio" id="radio">
    <div class="radio__bar">
      <div class="radio__brand">
        <span class="radio__eq" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
        <span class="radio__name">RÁDIO&nbsp;·&nbsp;A&amp;P&nbsp;<span class="fm">98.7 FM</span></span>
      </div>
      <div class="radio__now">
        <span class="radio__tag">NO AR</span>
        <span class="radio__track" id="radioTrack">Baby I'm Yours</span>
        <span class="radio__dot">—</span>
        <span class="radio__artist" id="radioArtist">Arctic Monkeys</span>
      </div>
      <div class="radio__controls">
        <button id="btnPrev" class="radio__btn" aria-label="Anterior">&#9198;</button>
        <button id="btnPlay" class="radio__btn radio__btn--play" aria-label="Tocar ou pausar">&#9654;</button>
        <button id="btnNext" class="radio__btn" aria-label="Próxima">&#9197;</button>
        <span class="radio__vol-wrap">
          <span class="radio__vol-ico" aria-hidden="true">VOL</span>
          <input type="range" id="vol" class="radio__vol" min="0" max="1" step="0.01" value="0.5" aria-label="Volume" />
        </span>
      </div>
    </div>
    <div class="radio__progress" id="progress" title="Avançar/retroceder">
      <div class="radio__progress-fill" id="progressFill"></div>
    </div>
  </header>

  <div class="top-bar">
    <button onclick="window.location.href='index.html'">⬅ VOLTAR</button>
  </div>
  <h1>Quebra-Cabeça</h1>
  <p class="subtitle">Pedro &amp; Amanda</p>

  <div class="difficulty">
    <button onclick="setDifficulty('facil')">Fácil</button>
    <button onclick="setDifficulty('medio')">Médio</button>
    <button onclick="setDifficulty('dificil')">Difícil</button>
  </div>

  <div id="content">
    <div id="gameScreen"></div>
   <div id="win">
  <div class="win-message">
    <p id="winText">IHUUUUUUUU VC É 10 DEMAIS VC CONSEGUIU! 🎉</p>
    <button id="nextLevelBtn" onclick="nextLevel()">PRÓXIMO NÍVEL →</button>
    <button onclick="restartGame()">MONTAR DE NOVO</button>
    <button onclick="closeWin()">FECHAR</button>
  </div>
</div>
    </div>
  </div>

  <script src="radio.js"></script>
  <script src="puzzle.js"></script>
</body>
</html>
